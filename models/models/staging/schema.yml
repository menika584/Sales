version: 2

models:

  - name: stg_employees
    columns:
      - name: employee_id
        tests:
          - not_null
          - unique

  - name: stg_departments
    columns:
      - name: department_id
        tests:
          - not_null
          - unique
  - name: stg_sales
    columns:
      - name: sale_id
        tests:
          - not_null
          - unique
  - name: stg_products
    columns:
          - name: product_id
            tests:
              - not_null
              - unique